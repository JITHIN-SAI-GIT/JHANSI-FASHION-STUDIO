services:
  # Backend service
  - type: web
    name: jhansi-fashion-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production

  # Frontend static site
  - type: web
    name: jhansi-fashion-frontend
    runtime: static
    rootDir: project
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: jhansi-fashion-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
