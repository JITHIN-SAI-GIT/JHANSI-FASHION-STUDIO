services:
  # Backend service
  - type: web
    name: jhansi-fashion-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node index.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production

  # Frontend service
  - type: web
    name: jhansi-fashion-frontend
    runtime: static
    buildCommand: cd project && npm install && npm run build
    staticPublishPath: project/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: jhansi-fashion-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
