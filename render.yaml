services:
  # Backend service
  - type: web
    name: jhansi-fashion-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production

  # Frontend static site
  - type: web
    name: jhansi-fashion-frontend
    runtime: static
    rootDir: project
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: jhansi-fashion-backend
          type: web
      - key: VITE_GOOGLE_CLIENT_ID
        value: 448652763901-8d097v886vjuigkdom0o7jlknback2nv.apps.googleusercontent.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
